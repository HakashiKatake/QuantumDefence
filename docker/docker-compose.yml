version: '3.8'

services:
  postgres:
    image: postgres:18-alpine
    container_name: qdefense-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: qdefense
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  vault:
    image: hashicorp/vault:latest
    container_name: qdefense-vault
    restart: always
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root-dev-token"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK

  auth-service:
    build:
      context: ../services/auth-service
      dockerfile: Dockerfile
    container_name: qdefense-auth-service
    restart: always
    ports:
      - "4001:4001"
    environment:
      PORT: 4001
      DATABASE_URL: "postgresql://postgres:postgrespassword@postgres:5432/qdefense?schema=auth"
      JWT_SECRET: "c2-top-secret-signing-key"
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "root-dev-token"
      NODE_ENV: production
    depends_on:
      - postgres
      - vault

  command-service:
    build:
      context: ../services/command-service
      dockerfile: Dockerfile
    container_name: qdefense-command-service
    restart: always
    ports:
      - "4002:4002"
    environment:
      PORT: 4002
      DATABASE_URL: "postgresql://postgres:postgrespassword@postgres:5432/qdefense?schema=command"
      JWT_SECRET: "c2-top-secret-signing-key"
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "root-dev-token"
      NODE_ENV: production
    depends_on:
      - postgres
      - vault

  threat-service:
    build:
      context: ../services/threat-service
      dockerfile: Dockerfile
    container_name: qdefense-threat-service
    restart: always
    ports:
      - "4003:4003"
    environment:
      PORT: 4003
      DATABASE_URL: "postgresql://postgres:postgrespassword@postgres:5432/qdefense?schema=threat"
      JWT_SECRET: "c2-top-secret-signing-key"
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "root-dev-token"
      NODE_ENV: production
    depends_on:
      - postgres
      - vault

  mission-service:
    build:
      context: ../services/mission-service
      dockerfile: Dockerfile
    container_name: qdefense-mission-service
    restart: always
    ports:
      - "4004:4004"
    environment:
      PORT: 4004
      DATABASE_URL: "postgresql://postgres:postgrespassword@postgres:5432/qdefense?schema=mission"
      JWT_SECRET: "c2-top-secret-signing-key"
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "root-dev-token"
      NODE_ENV: production
    depends_on:
      - postgres
      - vault

  gateway:
    image: nginx:stable-alpine
    container_name: qdefense-gateway
    restart: always
    ports:
      - "80:80"
    volumes:
      - ../gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - auth-service
      - command-service
      - threat-service
      - mission-service

  prometheus:
    image: prom/prometheus:latest
    container_name: qdefense-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
    depends_on:
      - auth-service
      - command-service
      - threat-service
      - mission-service

  grafana:
    image: grafana/grafana:latest
    container_name: qdefense-grafana
    restart: always
    ports:
      - "3001:3000"
    volumes:
      - ../monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      - prometheus

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: qdefense-elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: qdefense-logstash
    restart: always
    volumes:
      - ../logging/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    ports:
      - "50000:50000/tcp"
      - "50000:50000/udp"
      - "9600:9600"
    depends_on:
      - elasticsearch

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: qdefense-kibana
    restart: always
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch

volumes:
  postgres_data:
