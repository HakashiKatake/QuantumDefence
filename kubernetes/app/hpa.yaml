apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: c2-services-hpa
  namespace: quantum-defense
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: command-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: threat-service-hpa
  namespace: quantum-defense
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: threat-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
