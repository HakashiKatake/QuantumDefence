apiVersion: apps/v1
kind: Deployment
metadata:
  name: command-service
  namespace: quantum-defense
  labels:
    app: command-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: command-service
  template:
    metadata:
      labels:
        app: command-service
    spec:
      containers:
      - name: command-service
        image: quantum-defense/command-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4002
        envFrom:
        - configMapRef:
            name: c2-config
        env:
        - name: PORT
          value: "4002"
        - name: DATABASE_URL
          value: "postgresql://postgres:postgrespassword@db-service.quantum-defense.svc.cluster.local:5432/qdefense?schema=public"
        - name: JWT_SECRET
          value: "c2-top-secret-signing-key"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /api/domains/health
            port: 4002
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /api/domains/health
            port: 4002
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: command-service
  namespace: quantum-defense
  labels:
    app: command-service
spec:
  ports:
  - port: 4002
    targetPort: 4002
    protocol: TCP
  selector:
    app: command-service
